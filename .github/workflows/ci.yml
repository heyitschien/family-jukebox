name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  jukebox-safety:
    name: Build, lint & smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Smoke checks
        run: npm run smoke

      - name: Production build
        run: npm run build

  auto-merge:
    name: Auto-merge when green
    needs: jukebox-safety
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      !contains(github.event.pull_request.labels.*.name, 'no-automerge')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Merge pull request
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          state="$(gh pr view "$PR_NUMBER" --json state -q .state)"
          if [ "$state" = "MERGED" ]; then
            echo "PR #$PR_NUMBER is already merged."
            exit 0
          fi

          mergeable="$(gh pr view "$PR_NUMBER" --json mergeable -q .mergeable)"
          if [ "$mergeable" != "MERGEABLE" ]; then
            echo "PR #$PR_NUMBER is not mergeable (status: $mergeable)."
            exit 1
          fi

          gh pr merge "$PR_NUMBER" --merge --delete-branch
          echo "Merged PR #$PR_NUMBER."
