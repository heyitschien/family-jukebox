name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  jukebox-safety:
    name: Build, lint & smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Smoke checks
        run: npm run smoke

      - name: Production build
        run: npm run build

      - name: Production browser smoke
        run: npm run smoke:production

  auto-merge:
    name: Auto-merge when green
    needs: jukebox-safety
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      !contains(github.event.pull_request.labels.*.name, 'no-automerge')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Merge pull request
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr merge "$PR_NUMBER" --merge --delete-branch

      - name: Trigger production deploy
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run Deploy --ref main
          deploy_run_id="$(gh run list --workflow=Deploy --branch=main --limit=1 --json databaseId -q '.[0].databaseId')"
          gh run watch "$deploy_run_id" --exit-status
          gh workflow run CD --ref main
