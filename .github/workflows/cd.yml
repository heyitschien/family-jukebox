name: CD

on:
  workflow_run:
    workflows: [Deploy]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: cd-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify-production:
    name: Verify Vercel production deploy
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PRODUCTION_URL: https://cousinradio.com

    steps:
      - name: Wait for production alias
        run: sleep 20

      - name: Check homepage is live
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5 6 8 10; do
            html="$(curl -fsSL "$PRODUCTION_URL" || true)"
            if echo "$html" | grep -q "Cousin Radio" && ! echo "$html" | grep -q '__next_error__'; then
              echo "Production homepage OK (attempt $attempt)"
              exit 0
            fi
            echo "Attempt $attempt failed — retrying in 20s..."
            sleep 20
          done
          echo "Production verification failed after retries"
          exit 1

      - name: Check core routes
        run: |
          set -euo pipefail
          for path in /favorites /songs/tap-on-the-glass /songs/legacy-in-the-lane /members/sam-and-josh; do
            code="$(curl -s -o /dev/null -w '%{http_code}' "$PRODUCTION_URL$path")"
            echo "$path -> $code"
            test "$code" = "200"
          done

      - name: Check albums route
        run: curl -fsSL "$PRODUCTION_URL/albums" | grep -q "Family albums"

      - name: Check link preview metadata on homepage
        run: |
          set -euo pipefail
          html="$(curl -fsSL "$PRODUCTION_URL")"
          echo "$html" | grep -q 'property="og:site_name" content="Cousin Radio"'
          echo "$html" | grep -q "property=\"og:url\" content=\"$PRODUCTION_URL\""
          echo "$html" | grep -q "property=\"og:image\" content=\"$PRODUCTION_URL/opengraph-image"
          echo "$html" | grep -q 'name="twitter:card" content="summary_large_image"'

      - name: Check link preview metadata on song page
        run: |
          set -euo pipefail
          html="$(curl -fsSL "$PRODUCTION_URL/songs/legacy-in-the-lane")"
          echo "$html" | grep -q "property=\"og:url\" content=\"$PRODUCTION_URL/songs/legacy-in-the-lane\""
          echo "$html" | grep -q "property=\"og:image\" content=\"$PRODUCTION_URL/assets/sam-and-josh/legacy-in-the-lane.png\""
          echo "$html" | grep -q 'property="og:title" content="Legacy in the Lane · Cousin Radio"'

      - name: Check sitemap and robots
        run: |
          set -euo pipefail
          curl -fsSL "$PRODUCTION_URL/robots.txt" | grep -q "Sitemap: $PRODUCTION_URL/sitemap.xml"
          curl -fsSL "$PRODUCTION_URL/sitemap.xml" | grep -q "$PRODUCTION_URL/songs/legacy-in-the-lane"

      - name: Check API stats route
        run: |
          code="$(curl -s -o /dev/null -w '%{http_code}' "$PRODUCTION_URL/api/stats")"
          test "$code" = "200"

      - name: Check celebration song pages and assets
        run: |
          set -euo pipefail
          for slug in three-candles-for-marceline legacy-in-the-lane; do
            code="$(curl -s -o /dev/null -w '%{http_code}' "$PRODUCTION_URL/songs/$slug")"
            echo "song /songs/$slug -> $code"
            test "$code" = "200"
          done
          for slug in three-candles-for-marceline-album legacy-in-the-lane-album; do
            code="$(curl -s -o /dev/null -w '%{http_code}' "$PRODUCTION_URL/albums/$slug")"
            echo "album /albums/$slug -> $code"
            test "$code" = "200"
          done
          for asset in \
            /assets/marceline/three-candles-for-marceline.jpg \
            /assets/marceline/three-candles-for-marceline.mp3 \
            /assets/sam-and-josh/legacy-in-the-lane.png \
            /assets/sam-and-josh/legacy-in-the-lane.mp3 \
            /assets/tio-chien/tap-on-the-glass.jpg \
            /assets/tio-chien/tap-on-the-glass.mp3; do
            code="$(curl -s -o /dev/null -w '%{http_code}' "$PRODUCTION_URL$asset")"
            echo "asset $asset -> $code"
            test "$code" = "200"
          done

      - name: Check favorites page copy
        run: curl -fsSL "$PRODUCTION_URL/favorites" | grep -q "Your favorites"
